name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets --locked

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.85
      - run: cargo check --workspace --all-targets --locked

  python-client:
    name: python-client (${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test Python client
        env:
          PYTHONPATH: bindings/python/src
        run: python -m unittest discover -s bindings/python/tests
      - name: Build pure Python wheel
        run: >-
          python -m pip wheel --no-deps
          --wheel-dir "${{ runner.temp }}/open-edifier-wheel"
          bindings/python

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Test macOS store policy
        run: |
          xcrun swiftc -parse-as-library \
            apps/macos/StorePolicy.swift \
            apps/macos/tests/StorePolicyTests.swift \
            -o /tmp/open-edifier-store-policy-tests
          /tmp/open-edifier-store-policy-tests
      - run: apps/macos/package.sh
        env:
          OPEN_EDIFIER_BUILD_NUMBER: ${{ github.run_number }}
