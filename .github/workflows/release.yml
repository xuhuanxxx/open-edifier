name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "已经通过候选验收并完成 Homebrew 验证的 tag"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  github-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Validate tag and release notes
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml)
          test "$RELEASE_TAG" = "v$version"
          git tag --points-at HEAD | grep -Fxq "$RELEASE_TAG"
          test -f "docs/release-notes/$version.md"
          ! grep -q "尚未执行当前 tag 的发布前实机验收" "docs/release-notes/$version.md"
      - name: Run release quality gates
        shell: bash
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --all-targets --locked
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked
          cargo package --workspace --allow-dirty --no-verify
      - name: Build macOS release
        run: apps/macos/package.sh
        env:
          OPEN_EDIFIER_BUILD_NUMBER: ${{ github.run_number }}
      - name: Create GitHub prerelease
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=${RELEASE_TAG#v}
          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --prerelease \
            --title "OpenEdifier $version" \
            --notes-file "docs/release-notes/$version.md" \
            apps/macos/dist/OpenEdifier-"$version"-macos-arm64.dmg \
            apps/macos/dist/OpenEdifier-"$version"-macos-arm64.dmg.sha256
